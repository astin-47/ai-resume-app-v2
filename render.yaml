services:
  - type: web
    name: ai-resume-backend
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2

    envVars:
      - key: OPENAI_API_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false

      - key: PYTHON_VERSION
        value: "3.11.0"
